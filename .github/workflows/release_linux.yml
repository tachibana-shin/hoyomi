name: Build and Release

on:
  push:

jobs:
  build_deb:
    name: Build .deb for x64 and arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.29.3

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev libasound2-dev libmpv-dev

      - run: flutter pub get

      - name: Create .env file
        run: echo -e "${{ secrets.ENV_CONTENT }}" > .env

      - name: Create .env.web file
        run: echo -e "${{ secrets.ENV_WEB_CONTENT }}" > .env.web

      - name: Build runner
        run: sh build_bunner.sh

      - name: Build x64 binary
        run: flutter build linux --release

      - name: Package .deb for x64
        run: |
          mkdir -p deb-x64/DEBIAN
          mkdir -p deb-x64/usr/local/bin
          cp build/linux/x64/release/bundle/* deb-x64/usr/local/bin/ -r
          cat <<EOF > deb-x64/DEBIAN/control
          Package: hoyomi
          Version: 1.0.0
          Architecture: amd64
          Maintainer: Tachibana Shin <tachibshin@duck.com>
          Description: The application for watch anime and read manga for Android, iOS, MacOS, Windows, Linux and Web.
          EOF
          dpkg-deb --build deb-x64 app-linux-amd64-release.deb

      - name: Setup upterm session
        uses: lhotari/action-upterm@v1
        if: ${{ failure() }}
        with:
          wait-timeout-minutes: 5

      - name: Upload .deb x64
        uses: actions/upload-artifact@v4
        with:
          name: deb-files
          path: app-linux-amd64-release.deb
