name: Build and Release for Windows

on:
  push:

jobs:
  build_windows:
    name: Build .exe installer for Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.29.3

      - name: Install build dependencies
        run: |
          choco install nsis -y

      - name: Flutter pub get
        run: flutter pub get

      - name: Create .env file
        shell: bash
        run: echo -e "${{ secrets.ENV_CONTENT }}" > .env

      - name: Create .env.web file
        shell: bash
        run: echo -e "${{ secrets.ENV_WEB_CONTENT }}" > .env.web

      - name: Build runner
        shell: bash
        run: sh build_bunner.sh

      - name: Build Windows release
        run: flutter build windows --release

      - name: Generate NSIS script
        run: |
          $nsisScript = @"
          Outfile "hoyomi_installer.exe"
          InstallDir "$PROGRAMFILES\hoyomi"
          Page directory
          Page instfiles
          
          Section ""
          SetOutPath "$INSTDIR"
          File /r "build\windows\x64\runner\Release\*"
          CreateShortCut "$DESKTOP\Hoyomi.lnk" "$INSTDIR\hoyomi.exe"
          SectionEnd
          "@
          Set-Content -Path installer.nsi -Value $nsisScript

      - name: Create installer using NSIS
        run: makensis installer.nsi

      - name: Upload .exe installer
        uses: actions/upload-artifact@v4
        with:
          ame: hoyomi-windows-installer
        path: hoyomi_installer.exe
